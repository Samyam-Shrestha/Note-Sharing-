---
- name: Deploy Dockerized Application to target environment
  hosts: all
  become: yes
  vars:
    docker_image_tag: "latest"

  tasks:
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure app directory exists
      file:
        path: /opt/notes-app
        state: directory

    - name: Ensure nginx config directory exists
      file:
        path: /opt/notes-app/nginx
        state: directory

    - name: Ensure Prometheus config directory exists
      file:
        path: /opt/notes-app/prometheus
        state: directory

    - name: Copy docker-compose.prod.yml
      copy:
        src: docker-compose.prod.yml
        dest: /opt/notes-app/docker-compose.yml

    - name: Copy Nginx config
      copy:
        src: nginx/nginx.conf
        dest: /opt/notes-app/nginx/nginx.conf

    - name: Copy Nginx active upstream config
      copy:
        src: nginx/active-upstream.conf
        dest: /opt/notes-app/nginx/active-upstream.conf

    - name: Copy Prometheus config
      copy:
        src: prometheus/prometheus.yml
        dest: /opt/notes-app/prometheus/prometheus.yml

    - name: Pull Docker images
      command: docker compose pull
      args:
        chdir: /opt/notes-app
      environment:
        IMAGE_TAG: "{{ docker_image_tag }}"

    - name: Start Docker Compose
      command: docker compose up -d
      args:
        chdir: /opt/notes-app
      environment:
        IMAGE_TAG: "{{ docker_image_tag }}"
