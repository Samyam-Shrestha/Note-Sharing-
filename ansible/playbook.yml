---
- name: Deploy Dockerized Application to target environment
  hosts: all
  become: yes
  vars:
    docker_image_tag: "latest"
    database_url: "{{ lookup('env', 'DATABASE_URL') }}"
    note_encryption_key: "{{ lookup('env', 'NOTE_ENCRYPTION_KEY') }}"
    jwt_private_key: "{{ lookup('env', 'JWT_PRIVATE_KEY') }}"
    jwt_public_key: "{{ lookup('env', 'JWT_PUBLIC_KEY') }}"

  tasks:
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure app directory exists
      file:
        path: /opt/notes-app
        state: directory

    - name: Ensure nginx config directory exists
      file:
        path: /opt/notes-app/nginx
        state: directory

    - name: Ensure Prometheus config directory exists
      file:
        path: /opt/notes-app/prometheus
        state: directory

    - name: Copy docker-compose.prod.yml
      copy:
        src: docker-compose.prod.yml
        dest: /opt/notes-app/docker-compose.yml

    - name: Copy Nginx config
      copy:
        src: nginx/nginx.conf
        dest: /opt/notes-app/nginx/nginx.conf

    - name: Copy Nginx active upstream config
      copy:
        src: nginx/active-upstream.conf
        dest: /opt/notes-app/nginx/active-upstream.conf

    - name: Copy Prometheus config
      copy:
        src: prometheus/prometheus.yml
        dest: /opt/notes-app/prometheus/prometheus.yml

    - name: Validate required secret inputs are present
      assert:
        that:
          - database_url | length > 0
          - note_encryption_key | length > 0
          - jwt_private_key | length > 0
          - jwt_public_key | length > 0
        fail_msg: "Missing one or more required deployment secrets from Jenkins credentials."

    - name: Render deployment environment file
      template:
        src: env.prod.j2
        dest: /opt/notes-app/.env
        mode: "0600"
      no_log: true

    - name: Pull Docker images
      command: docker compose --env-file .env pull
      args:
        chdir: /opt/notes-app
      environment:
        IMAGE_TAG: "{{ docker_image_tag }}"

    - name: Start Docker Compose
      command: docker compose --env-file .env up -d
      args:
        chdir: /opt/notes-app
      environment:
        IMAGE_TAG: "{{ docker_image_tag }}"
