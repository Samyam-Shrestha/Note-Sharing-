version: "3.9"
services:
  backend_blue:
    image: my-docker-repo/notes-backend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost
      DATABASE_URL: ${DATABASE_URL}
      PG_SSL_REJECT_UNAUTHORIZED: "true"
      NOTE_ENCRYPTION_KEY: ${NOTE_ENCRYPTION_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    ports:
      - "4001:4000"

  backend_green:
    image: my-docker-repo/notes-backend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost
      DATABASE_URL: ${DATABASE_URL}
      PG_SSL_REJECT_UNAUTHORIZED: "true"
      NOTE_ENCRYPTION_KEY: ${NOTE_ENCRYPTION_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    ports:
      - "4002:4000"

  frontend_blue:
    image: my-docker-repo/notes-frontend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "3001:80"

  frontend_green:
    image: my-docker-repo/notes-frontend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "3002:80"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - backend_blue
      - backend_green
      - frontend_blue
      - frontend_green
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/active-upstream.conf:/etc/nginx/conf.d/active-upstream.conf:ro
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    profiles: ["linux-observability"]
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    profiles: ["linux-observability"]
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"
