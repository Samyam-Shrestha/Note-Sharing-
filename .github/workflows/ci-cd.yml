name: secure-ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/notes-backend

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Run backend tests with coverage threshold
        working-directory: backend
        run: npm test -- --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  sast:
    name: sast
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/nodejs
            p/jwt
            semgrep.yml
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit backend
        working-directory: backend
        run: npm audit --audit-level=high
      - name: npm audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Snyk scan backend
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/package.json
      - name: Snyk scan frontend
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json

  docker-build-scan:
    name: docker-build-scan
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} ./backend
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          trivy-config: trivy.yaml
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.6.0
      - name: Push image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest
      - name: Keyless sign image
        run: cosign sign --yes $IMAGE_NAME:${{ github.sha }}

  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    needs: docker-build-scan
    steps:
      - uses: actions/checkout@v4
      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
      - name: Deploy staging
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -n notes-staging -f k8s/backend-deployment.yaml
          kubectl apply -n notes-staging -f k8s/frontend-deployment.yaml
          kubectl apply -n notes-staging -f k8s/services.yaml
          kubectl apply -n notes-staging -f k8s/ingress.yaml
          kubectl set image deployment/backend backend=$IMAGE_NAME:${{ github.sha }} -n notes-staging
      - name: Smoke test
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          curl -f "$STAGING_URL/health"
      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.STAGING_URL }}
          cmd_options: -c zap-baseline.conf

  manual-approval:
    name: manual-approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}
    steps:
      - run: echo "Awaiting reviewer sign-off for production release."

  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    needs: manual-approval
    steps:
      - uses: actions/checkout@v4
      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
      - name: Deploy green
        run: |
          kubectl apply -n notes-production -f k8s/backend-deployment.yaml
          kubectl apply -n notes-production -f k8s/frontend-deployment.yaml
          kubectl apply -n notes-production -f k8s/services.yaml
          kubectl set image deployment/backend backend=$IMAGE_NAME:${{ github.sha }} -n notes-production
          kubectl rollout status deployment/backend -n notes-production --timeout=60s
      - name: Switch service selector (blue/green)
        run: kubectl patch service backend -n notes-production -p '{"spec":{"selector":{"app":"backend","track":"green"}}}'
      - name: Health check with rollback
        run: |
          set -e
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          if ! timeout 60 bash -c 'until curl -sf "$0/health"; do sleep 5; done' "$PROD_URL"; then
            kubectl rollout undo deployment/backend -n notes-production
            kubectl patch service backend -n notes-production -p '{"spec":{"selector":{"app":"backend","track":"blue"}}}'
            exit 1
          fi
