title = "custom-secure-notes-gitleaks"

[extend]
useDefault = true

[[rules]]
id = "jwt-like-secrets"
description = "Detect potential JWT secrets/private keys"
regex = '''(?i)(jwt|token|private[_-]?key)\s*[:=]\s*["']?[A-Za-z0-9_\-]{24,}["']?'''
tags = ["key", "jwt", "secret"]

[[rules]]
id = "db-connection-string"
description = "Detect database connection string leakage"
regex = '''(?i)postgres(?:ql)?:\/\/[^:\s]+:[^@\s]+@[^\/\s]+\/[^\s"']+'''
tags = ["database", "credentials"]

[allowlist]
description = "Ignore local/dev secret files that are managed outside CI scans"
paths = [
  '''(^|/)\.env$''',
  '''(^|/)\.env\.example$''',
  '''(^|/)private\.pem$''',
  '''(^|/)public\.pem$''',
  '''(^|/)ansible/docker-compose\.prod\.yml$'''
]
