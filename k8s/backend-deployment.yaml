apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    track: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      track: green
  template:
    metadata:
      labels:
        app: backend
        track: green
    spec:
      serviceAccountName: notes-app-sa
      containers:
        - name: backend
          image: ghcr.io/example/notes-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            # Security: inject secrets at runtime; do not bake into image.
            - secretRef:
                name: notes-backend-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
