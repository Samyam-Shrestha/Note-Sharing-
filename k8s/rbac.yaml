apiVersion: v1
kind: ServiceAccount
metadata:
  name: notes-app-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notes-app-role
rules:
  # Security: minimal read-only permissions required by app pods.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notes-app-rb
subjects:
  - kind: ServiceAccount
    name: notes-app-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notes-app-role
